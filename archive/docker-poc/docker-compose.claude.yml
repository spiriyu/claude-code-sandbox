services:
  claude-code-sandbox:
    build:
      context: ..
      dockerfile: docker/Dockerfile.claude
      args:
        USER_UID: ${UID:-1000}
        USER_GID: ${GID:-1000}
    container_name: claude-code-sandbox
    working_dir: /workspace
    stdin_open: true
    tty: true
    restart: unless-stopped
