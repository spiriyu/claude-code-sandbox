      - CLAUDE_CODE_OAUTH_TOKEN=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
    volumes:
      - ..:/workspace
